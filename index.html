<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTI PayLink</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Hind Siliguri',sans-serif;
  background:#f9fafb;
}

/* HEADER */
.header {
  padding:14px;
  background:#fff;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.logo { color:#00b894; font-weight:700; }

/* TABS */
.tabs { display:flex; background:#fff; border-bottom:1px solid #eee; }
.tab {
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
}
.tab.active { color:#00b894; border-bottom:2px solid #00b894; }

/* SECTIONS */
.section { display:none; padding:16px; }
.section.active { display:block; }

/* CARD */
.card {
  background:#fff;
  padding:16px;
  border-radius:10px;
  margin-bottom:10px;
}

/* LOGIN */
#loginScreen {
  position:fixed;
  inset:0;
  background:#f9fafb;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:320px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00b894;
  color:white;
  cursor:pointer;
  margin-bottom:8px;
}

.admin-btn { background:#3b82f6; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3 style="text-align:center;color:#00b894;">HTI PayLink</h3>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="ownerLogin()">Owner Login</button>
    <button class="admin-btn" onclick="adminLogin()">Admin (Google)</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
  <div class="logo">HTI PayLink</div>
  <div onclick="logout()">🚪</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard',this)">Dashboard</div>
  <div class="tab" onclick="switchTab('members',this)">Members</div>
  <div class="tab" onclick="switchTab('reminder',this)">Reminder</div>
  <div class="tab" onclick="switchTab('report',this)">Report</div>
</div>

<div id="dashboard" class="section active">
  <div class="card">Dashboard Ready ✅</div>
</div>

<div id="members" class="section">
  <div class="card">Members Section</div>
</div>

<div id="reminder" class="section">
  <div class="card">Reminder Section</div>
</div>

<div id="report" class="section">
  <div class="card">Report Section</div>
</div>

</div>

<script>

// LOGIN
function ownerLogin(){
  const u=document.getElementById("username").value;
  const p=document.getElementById("password").value;

  if(u==="Samsad" && p==="@#Samsad#@"){
    document.getElementById("loginScreen").style.display="none";
  } else {
    alert("Wrong login");
  }
}

function adminLogin(){
  alert("Google login next step");
}

// LOGOUT
function logout(){
  location.reload();
}

// TAB SWITCH
function switchTab(id,el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
